# Render Blueprint — deploys the whole Forex Intelligence Terminal (backend + frontend)
# as two free web services from one repo. See DEPLOY.md for click-by-click steps.
services:
  # ---- FastAPI backend -----------------------------------------------------
  - type: web
    name: forex-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"
      - key: AI_PROVIDER
        value: mock
      - key: CORS_ORIGINS
        value: '["*"]'

  # ---- Next.js frontend ----------------------------------------------------
  - type: web
    name: forex-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      # Paste your backend's public URL here after it deploys, e.g.
      # https://forex-backend.onrender.com  (Render will prompt you for it).
      - key: NEXT_PUBLIC_API_BASE_URL
        sync: false
